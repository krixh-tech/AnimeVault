version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: animavault_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-animavault_secret}
      MONGO_INITDB_DATABASE: animavault
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - animavault_net

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: animavault_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-redis_secret} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - animavault_net

  # ── Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: animavault_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-animavault_secret}@mongodb:27017/animavault?authSource=admin
      REDIS_URL: redis://:${REDIS_PASS:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh_secret_key}
      STORAGE_MODE: ${STORAGE_MODE:-local}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    networks:
      - animavault_net

  # ── Download Worker ───────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: animavault_worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-animavault_secret}@mongodb:27017/animavault?authSource=admin
      REDIS_URL: redis://:${REDIS_PASS:-redis_secret}@redis:6379
      STORAGE_MODE: ${STORAGE_MODE:-local}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      - mongodb
      - redis
    networks:
      - animavault_net

  # ── Episode Scheduler ─────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    container_name: animavault_scheduler
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-animavault_secret}@mongodb:27017/animavault?authSource=admin
      REDIS_URL: redis://:${REDIS_PASS:-redis_secret}@redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - animavault_net

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: animavault_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://backend:5000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - animavault_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: animavault_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/uploads:/var/www/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - animavault_net

volumes:
  mongo_data:
  redis_data:

networks:
  animavault_net:
    driver: bridge
